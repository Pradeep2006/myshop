<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharma General Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f7fa;color:#333}
header{background:#1e3a8a;color:#fff;padding:20px;text-align:center}
header h1{font-size:24px}
header p{font-size:14px;opacity:.9}
.filters{display:flex;gap:10px;overflow-x:auto;padding:15px;background:#fff}
.filters button{padding:8px 15px;border:none;border-radius:20px;background:#e2e8f0;cursor:pointer;white-space:nowrap}
.filters button.active{background:#1e3a8a;color:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05);padding:10px;display:flex;flex-direction:column}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px}
.card h3{font-size:14px;margin:8px 0}
.card p{font-size:12px;color:#555}
.price{font-weight:600;margin:5px 0}
.card button{margin-top:auto;padding:8px;border:none;border-radius:8px;background:#1e3a8a;color:#fff;cursor:pointer}
.cart-icon{position:fixed;bottom:20px;right:20px;background:#1e3a8a;color:#fff;padding:15px;border-radius:50%;cursor:pointer}
.cart-count{position:absolute;top:-5px;right:-5px;background:red;color:#fff;font-size:12px;border-radius:50%;padding:3px 7px}
.cart-modal{position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,.2);transition:.3s;padding:20px;overflow-y:auto}
.cart-modal.active{right:0}
.cart-item{display:flex;justify-content:space-between;margin:10px 0}
.qty-controls button{padding:2px 8px;margin:0 5px}
.total{font-weight:600;margin-top:10px}
.checkout-btn{margin-top:10px;width:100%;padding:10px;background:#16a34a;color:#fff;border:none;border-radius:8px}
.close-btn{float:right;cursor:pointer;font-size:18px}
.whatsapp{position:fixed;bottom:90px;right:20px;background:#25d366;color:#fff;padding:12px 15px;border-radius:50px;text-decoration:none}
form input,form textarea{width:100%;margin:8px 0;padding:8px;border:1px solid #ccc;border-radius:6px}
form button{background:#1e3a8a;color:#fff;padding:10px;border:none;border-radius:6px;width:100%}
.success{background:#dcfce7;padding:10px;border-radius:8px;margin-top:10px;text-align:center}
</style>
</head>

<body>

<header>
<h1>Kushwaha General Store</h1>
<p>Fresh groceries delivered to your door • Jhansi, UP</p>
</header>

<div class="filters" id="filters"></div>

<div class="products" id="products"></div>

<div class="cart-icon" onclick="toggleCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<a class="whatsapp" href="https://wa.me/7275046736" target="_blank">
Chat on WhatsApp
</a>

<div class="cart-modal" id="cartModal">
<span class="close-btn" onclick="toggleCart()">✖</span>
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total" id="cartTotal"></div>
<button class="checkout-btn" onclick="showCheckout()">Place Order</button>

<div id="checkoutForm" style="display:none;">
<form action="https://formspree.io/f/xkovdvkj" method="POST" onsubmit="return submitOrder(event)">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Delivery Address" required></textarea>
<textarea name="instructions" placeholder="Special Instructions (Optional)"></textarea>
<input type="hidden" name="order_details" id="orderDetails">
<button type="submit">Submit Order</button>
</form>
<div id="successMsg"></div>
</div>

</div>

<script>
const products=[
{name:"Aashirvaad Atta (5kg)",price:280,category:"Groceries",image:"https://ibb.co/n8cj25NX",desc:"Premium whole wheat flour"},
{name:"Amul Butter (500g)",price:280,category:"Dairy",image:"https://ibb.co/zTQxNrsk",desc:"Fresh salted butter"},
{name:"Britannia Bread",price:40,category:"Groceries",image:"https://ibb.co/kVK8NhSH",desc:"Soft white bread"},
{name:"Tata Salt (1kg)",price:25,category:"Groceries",image:"https://ibb.co/tpJTLBqb",desc:"Pure iodized salt"},
{name:"Amul Milk (1L)",price:60,category:"Dairy",image:"https://ibb.co/9kk7hnjt",desc:"Fresh toned milk"},
{name:"Coca Cola (2L)",price:95,category:"Beverages",image:"https://ibb.co/gbsKZmdf",desc:"Chilled soft drink"},
{name:"Lays Chips",price:20,category:"Snacks",image:"https://ibb.co/wk4Qx54",desc:"Crispy potato chips"},
{name:"Maggi (12 pack)",price:168,category:"Snacks",image:"https://ibb.co/wk4Qx54z",desc:"Instant noodles"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));updateCart()}

function updateCart(){
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);
let cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";
let total=0;
cart.forEach((item,i)=>{
let sub=item.price*item.qty;
total+=sub;
cartItems.innerHTML+=`
<div class="cart-item">
<div>
<strong>${item.name}</strong><br>₹${item.price} x ${item.qty}<br>Subtotal: ₹${sub}
</div>
<div class="qty-controls">
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="changeQty(${i},1)">+</button>
<button onclick="removeItem(${i})">❌</button>
</div>
</div>`;
});
document.getElementById("cartTotal").innerText="Grand Total: ₹"+total;
}

function addToCart(i){
let item=cart.find(p=>p.name===products[i].name);
if(item){item.qty++}else{cart.push({...products[i],qty:1})}
saveCart();
}

function changeQty(i,delta){
cart[i].qty+=delta;
if(cart[i].qty<=0)cart.splice(i,1);
saveCart();
}

function removeItem(i){cart.splice(i,1);saveCart()}

function toggleCart(){document.getElementById("cartModal").classList.toggle("active")}

function showCheckout(){document.getElementById("checkoutForm").style.display="block"}

function submitOrder(e){
e.preventDefault();
let summary="Order Summary:\n";
let total=0;
cart.forEach(item=>{
summary+=`${item.name} - Qty: ${item.qty} - ₹${item.price*item.qty}\n`;
total+=item.price*item.qty;
});
summary+="\nGrand Total: ₹"+total;
document.getElementById("orderDetails").value=summary;

fetch(e.target.action,{
method:"POST",
body:new FormData(e.target),
headers:{'Accept':'application/json'}
}).then(()=>{
cart=[];
saveCart();
document.getElementById("successMsg").innerHTML=
`<div class="success">
Order placed! Kushwaha General Store will contact you on WhatsApp to confirm.
<br><br>
<a href="https://wa.me/7275046736" target="_blank">Click here to message on WhatsApp</a>
</div>`;
});
return false;
}

function renderProducts(filter="All"){
let container=document.getElementById("products");
container.innerHTML="";
products.filter(p=>filter==="All"||p.category===filter)
.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" alt="${p.name}" loading="lazy">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">₹${p.price}</div>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});
}

function renderFilters(){
let cats=["All",...new Set(products.map(p=>p.category))];
let container=document.getElementById("filters");
cats.forEach(cat=>{
let btn=document.createElement("button");
btn.innerText=cat;
btn.onclick=()=>{document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderProducts(cat)};
if(cat==="All")btn.classList.add("active");
container.appendChild(btn);
});
}

renderFilters();
renderProducts();
updateCart();
</script>

</body>

</html>
